<!DOCTYPE html>

<head>

  />
  <link rel="stylesheet" href="Style.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#C9A84C',
            'gold-light': '#E8C97A',
            dark: '#0D0D0D',
            'dark-2': '#141414',
            'dark-3': '#1C1C1C',

        }
      }
    }
  </script>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 px-6 py-5 md:px-12">
  <div class="max-w-7xl mx-auto flex items-center justify-between">

    <a href="#hero" class="font-['Playfair_Display'] text-xl font-bold">
      M<span class="gold">.</span>Portfolio

    <ul class="hidden md:flex items-center gap-8 text-sm font-light tracking-wide">

      <li><a href="#projects"   class="nav-link hover:text-white transition-colors">Projets</a></li>

        </a>
      </li>
    </ul>
